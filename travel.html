<html>
 <head>
  <title>
   Snow Mountain Tour
  </title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <style>
   body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
        }
        .header {
            background-image: url('https://placehold.co/1920x300');
            background-size: cover;
            background-position: center;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin: 0;
        }
        .header p {
            font-size: 1.2em;
        }
        .green-buttons {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .green-buttons button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 0 10px;
            cursor: pointer;
            font-size: 1em;
        }
        .content {
            text-align: center;
            margin: 20px;
        }
        .content img {
            max-width: 100%;
            height: auto;
        }
        .video {
            margin: 20px 0;
        }
        .comment-section {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }
        .comment-section img {
            border-radius: 50%;
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        .comment-section button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1em;
        }
        .lodging {
            text-align: center;
            margin: 20px;
        }
  </style>
 </head>
 <body>
  <div class="header">
   <div>
    <h1>
     Snow Mountain Tour
    </h1>
    <p>
     Discover amazing places at exclusive deals with Mayalu Tour
    </p>
   </div>
  </div>
  <div class="green-buttons">
   <button>
    Tour One Night
   </button>
   <button>
    Tour Two Nights
   </button>
   <button>
    Tour Three Nights
   </button>
  </div>
  <div class="content">
   <h2>
    Check out how we enjoy
   </h2>
   <img alt="Mountain Snow Mountain Tour 2024 poster with pricing details" height="600" src="https://storage.googleapis.com/a1aa/image/wOalIvp2sE5GAZzgNNbARfs6ha9NReGQCEN0e0DvqDovHVknA.jpg" width="400"/>
   <div class="video">
    <img alt="Video thumbnail of snowy mountain landscape" height="450" src="https://storage.googleapis.com/a1aa/image/ONzJecMaD51neEbaA3hngXeSeLjkvhSWkzwvksPJLKxTPqIPB.jpg" width="800"/>
   </div>
  </div>
  <div class="comment-section">
   <img alt="User profile picture" height="50" src="https://storage.googleapis.com/a1aa/image/8DKqFknb8GZSOZCtOAywn1etGcUaTbhb0fxxOpffgXOXPqIPB.jpg" width="50"/>
   <button>
    Are you planning to visit next?
   </button>
  </div>
  <div class="lodging">
   <h2>
    Check our Lodging
   </h2>
   <img alt="Lodging options poster with pricing details" height="600" src="https://storage.googleapis.com/a1aa/image/hHP5rGacfesPAEUm7efXIeOQvkGIeZz7HO670ouXlm0r9oi8E.jpg" width="400"/>
  </div>
 </body>
</html>
